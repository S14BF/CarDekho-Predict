kind = "web"
previewPath = "/"
title = "Car Price Predictor"
version = "1.0.0"
id = "artifacts/car-price-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22943

[services.development]
run = "pnpm --filter @workspace/car-price-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/car-price-app", "run", "build" ]
publicDir = "artifacts/car-price-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22943"
BASE_PATH = "/"
